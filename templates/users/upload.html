{% extends 'users/user_base.html' %}

{% block content %}
<div style="text-align: center; padding-top: 20px;">
    <h2>Upload an Image for Oral Cancer Detection</h2>

    <form action="{% url 'predict_image' %}" method="post" enctype="multipart/form-data" style="margin-top: 20px;">
        {% csrf_token %}
        <input type="file" name="image" required>
        <br><br>
        <button type="submit">Detect</button>
    </form>

    {% if label %}
        <div style="margin-top: 30px;">
            <h3>Prediction: {{ label }}</h3>
            <p>Confidence Score: {{ score }}%</p>
            <img src="/{{ image_path }}" alt="Uploaded Image" style="max-width: 300px; border: 1px solid #ccc; padding: 10px;">
        </div>
    {% endif %}
</div>
{% endblock %}
