{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Oral Cancer Detector</title>
    <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: #f0f2f5; font-family: 'Segoe UI', Inter, sans-serif; display: flex; flex-direction: column; }

        /* NAV */
        .top-nav {
            background: #2d2d2d; padding: 14px 40px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            border-bottom: 3px solid #7c3aed;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .top-nav .brand { font-size: 1.2rem; font-weight: 700; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .top-nav .brand i { color: #f97316; }
        .top-nav .nav-links { display: flex; align-items: center; gap: 8px; }
        .top-nav .nav-links a { color: #ccc; text-decoration: none; padding: 7px 16px; border-radius: 6px; font-size: 0.88rem; transition: all 0.2s; }
        .top-nav .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .top-nav .nav-links a.active { color: #7c3aed; font-weight: 600; }
        .top-nav .nav-links a.btn-nav { background: #7c3aed; color: #fff; font-weight: 600; }
        .top-nav .nav-links a.btn-nav:hover { background: #6d28d9; color: #fff; }

        /* PAGE */
        .page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px 20px 40px; }

        /* CARD */
        .login-card {
            background: #fff; border-radius: 20px; padding: 44px 40px;
            width: 100%; max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card-icon {
            width: 56px; height: 56px; border-radius: 14px;
            background: linear-gradient(135deg, #7c3aed, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: #fff; margin: 0 auto 20px auto;
        }

        .card-title { font-size: 1.5rem; font-weight: 700; color: #111; margin-bottom: 6px; }
        .card-subtitle { color: #999; font-size: 0.85rem; margin-bottom: 32px; }

        .field-label { color: #888; font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; text-align: left; }

        .form-control {
            background: #f8f9fa !important; border: 1px solid #e5e7eb !important;
            color: #111 !important; border-radius: 10px; padding: 13px 14px; font-size: 0.9rem;
        }
        .form-control:focus {
            background: #fff !important; border: 1px solid #7c3aed !important;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.15) !important; color: #111 !important;
        }
        .form-control::placeholder { color: #aaa; }

        .btn-login {
            width: 100%; background: linear-gradient(135deg, #7c3aed, #7c3aed);
            color: #fff; border: none; padding: 13px; border-radius: 10px;
            font-size: 0.95rem; font-weight: 600; margin-top: 8px;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }

        .register-link { text-align: center; font-size: 0.85rem; color: #999; margin-top: 20px; }
        .register-link a { color: #7c3aed; text-decoration: none; font-weight: 600; }

        .alert-msg {
            background: #fff5f5; border: 1px solid #fecaca;
            color: #7c3aed; border-radius: 8px; padding: 10px 14px;
            font-size: 0.83rem; margin-bottom: 16px; text-align: left;
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="{% url 'index' %}" class="brand"><i class="bi bi-heart-pulse-fill"></i> Oral Cancer Detector</a>
    <div class="nav-links">
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'user_login' %}" class="active">User Login</a>
        <a href="{% url 'register' %}" class="btn-nav">Sign Up</a>
    </div>
</nav>

<div class="page-wrap">
    <div class="login-card">
        <div class="card-icon"><i class="bi bi-heart-pulse-fill"></i></div>
        <div class="card-title">Welcome back</div>
        <div class="card-subtitle">Sign in to continue to Oral Cancer Detector</div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-msg"><i class="bi bi-exclamation-circle me-2"></i>{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form action="{% url 'user_login_check' %}" method="POST" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="field-label">Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="you@example.com">
            </div>
            <div class="mb-3">
                <label class="field-label">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="{% url 'register' %}">Create one free</a>
        </div>
    </div>
</div>

<script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
